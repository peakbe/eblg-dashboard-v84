<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EBLG Dashboard</title>

    <!-- Leaflet CSS -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Leaflet PolylineDecorator -->
    <script 
        src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.polylinedecorator/1.7.0/leaflet.polylineDecorator.min.js">
    </script>

    <!-- Ton CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 15px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
            margin-bottom: 5px;
        }

        /* MAP */
        #map {
            width: 100%;
            height: 500px;
            margin-top: 10px;
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- PANNEAU D’ÉTAT GLOBAL -->
    <div id="status-panel"></div>

    <!-- PANNEAU PISTE ACTIVE + CROSSWIND -->
    <div id="runway-panel"></div>

    <h2>METAR</h2>
    <div id="metar"></div>

    <h2>TAF</h2>
    <div id="taf"></div>

    <h2>FIDS</h2>
    <div id="fids"></div>

    <h2>Carte</h2>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script 
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- Ton script principal -->
    <script src="app.js?v=12"></script>

</body>
</html>
